
<!DOCTYPE html>
<html>


<head>
  <title>Rock Paper Scissors</title>
  <meta name="viewport" content="height=device-height, initial-scale=1">
  <link rel="stylesheet" href="">

  <style>
  </style>
</head>

<!--
game's algorithm.
Objective: create a rock paper scissors game
- player click one of the button to chose a value
- computer randomly choose a value
- both value will be compared
- update a score
- display result and score in a popup
-->

<body>
  <p>Rock Paper Scissors</p>
  <button onclick="
    playGame('rock');
  ">Rock</button>

  <button onclick="
    playGame('paper');
  ">Paper</button>

  <button onclick="
    playGame('scissors');
  ">Scissor</button>

  <button onclick="
    score.wins = 0;
    score.losses = 0;
    score.ties = 0;
    localStorage.removeItem('score');
  ">Reset Score</button>

  <script>
    // fetch values from localStorage into score, convert it back into text and numeral object and if the value is null, use default operator read the next value
    let score = JSON.parse(localStorage.getItem('score')) || {
        wins : 0,
        losses : 0,
        ties: 0
      };

    /* laternatively, you can use this to reset the score
    if (!score) {
      score = {
        wins : 0,
        losses : 0,
        ties: 0
      }
    }
    */

    // parameter heavy function
    function playGame(playerMove) {

      const computerMove = pickComputerMove();
      console.log(computerMove);
      let result = '';

      if (playerMove === 'scissors') {
        if (computerMove === 'scissor') {
          result = 'Tie';
        } else if (computerMove === 'rock') {
          result = 'You lose';
        } else if (computerMove === 'paper') {
          result = 'You win';
        }
      } 
      
      else if (playerMove === 'paper') {
        if (computerMove === 'rock') {
          result = 'You win';
        } else if (computerMove === 'paper') {
          result = 'Tie';
        } else if (computerMove === 'scissor') {
          result = 'You lose';
        }
      }

      else if (playerMove === 'rock') {
      if (computerMove === 'rock') {
          result = 'Tie';
        } else if (computerMove === 'paper') {
          result = 'You lose';
        } else if (computerMove === 'scissor') {
          result = 'You win';
        }
      }

      if (result === 'You win') {
        score.wins += 1;
      } else if (result === 'You lose') {
        score.losses += 1;
      } else if (result === 'Tie') {
        score.ties += 1;
      }

      // Local store is useful to save data permanently
      // the first of the pair is to name a value, the second is the value you want to save
      // local storage only support string
      // in this example, you need to declare localStorage.setItem and then call this function outside of this function. however since this method can only work with string, the value needs to be converted using stringyfy
      localStorage.setItem('message', JSON.stringify(score));

      alert(`You picked ${playerMove}. Computer picked ${computerMove}. ${result}. Wins: ${score.wins}, Losses: ${score.losses}, Ties: ${score.ties}`);
    }


    // a function; useful for repeatable computer operations
    function pickComputerMove () {
        const randomNumber = Math.random();
        let computerMove = '';

        if (randomNumber >= 0 && randomNumber < 1/3 ) {
        computerMove = 'rock';
      } else if (randomNumber >= 1/3 && randomNumber < 2/3) {
        computerMove = 'paper';
      } else if (randomNumber >= 2/3 && randomNumber < 1) {
        computerMove = 'scissor';
      }
      // return a value from a function, it wont execute anything below it
      return computerMove;
    }

  </script>

</body>
</html>
