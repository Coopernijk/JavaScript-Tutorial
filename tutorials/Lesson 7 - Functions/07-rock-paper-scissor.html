<!--
game's algorithm.
Objective: create a rock paper scissors game
- player click one of the button to chose a value
- computer randomly choose a value
- both value will be compared
- display result in a popup
-->

<body>
  <p>Rock Paper Scissors</p>
  <button onclick="
    playGame('rock');
  ">Rock</button>

  <button onclick="
    playGame('paper');
  ">Paper</button>

  <button onclick="
    playGame('scissors');
  ">Scissor</button>


  <script>

    // parameter heavy function
    function playGame(playerMove) {

      const computerMove = pickComputerMove();
      console.log(computerMove);
      let result = '';

      if (playerMove === 'scissors') {
        if (computerMove === 'scissor') {
          result = 'Tie';
        } else if (computerMove === 'rock') {
          result = 'You lose';
        } else if (computerMove === 'paper') {
          result = 'You win';
        }
      } 
      
      else if (playerMove === 'paper') {
        if (computerMove === 'rock') {
          result = 'You win';
        } else if (computerMove === 'paper') {
          result = 'Tie';
        } else if (computerMove === 'scissor') {
          result = 'You lose';
        }
      }

      else if (playerMove === 'rock') {
      if (computerMove === 'rock') {
          result = 'Tie';
        } else if (computerMove === 'paper') {
          result = 'You lose';
        } else if (computerMove === 'scissor') {
          result = 'You win';
        }
      }

      alert(`You picked ${playerMove}. Computer picked ${computerMove}. ${result}.`);
    }


    // a function; useful for repeatable computer operations
    function pickComputerMove () {
        const randomNumber = Math.random();
        let computerMove = '';

        if (randomNumber >= 0 && randomNumber < 1/3 ) {
        computerMove = 'rock';
      } else if (randomNumber >= 1/3 && randomNumber < 2/3) {
        computerMove = 'paper';
      } else if (randomNumber >= 2/3 && randomNumber < 1) {
        computerMove = 'scissor';
      }
      // return a value from a function, it wont execute anything below it
      return computerMove;
    }

  </script>

</body>
